<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Range Filter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 142px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #EE7944; }

  .container { width: 100%; height: 142px; background: #EE7944; border: none; border-radius: 0; overflow: hidden; display: flex; flex-direction: column; }

  .topbar { display: flex; align-items: center; height: 52px; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.15); gap: 0; flex-shrink: 0; background: #EE7944; }
  .date-label { font-size: 12px; color: rgba(255,255,255,0.8); margin-right: 10px; white-space: nowrap; font-weight: 500; }
  .date-display { font-size: 12px; font-weight: 500; color: #fff; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.4); border-radius: 7px; display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.15); white-space: nowrap; min-width: 170px; }
  .divider-v { width: 1px; height: 24px; background: rgba(255,255,255,0.25); margin: 0 14px; flex-shrink: 0; }
  .quick-row { display: flex; gap: 5px; flex: 1; align-items: center; }
  .chip { font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.35); background: transparent; cursor: pointer; color: rgba(255,255,255,0.85); white-space: nowrap; transition: all 0.1s; font-family: inherit; }
  .chip:hover { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.6); }
  .chip.active { background: rgba(255,255,255,0.25); color: #fff; border-color: rgba(255,255,255,0.8); font-weight: 600; }
  .apply-btn { margin-left: 12px; padding: 6px 16px; font-size: 12px; font-weight: 600; background: #fff; color: #EE7944; border: none; border-radius: 7px; cursor: pointer; display: flex; align-items: center; gap: 5px; flex-shrink: 0; font-family: inherit; transition: opacity 0.1s; }
  .apply-btn:hover { opacity: 0.9; }
  .apply-btn:active { transform: scale(0.98); }
  .apply-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .toast { font-size: 11px; margin-left: 10px; white-space: nowrap; min-width: 110px; color: #fff; }

  .cal-row { display: flex; flex: 1; align-items: center; padding: 0 16px; overflow: hidden; background: #EE7944; }
  .cal-nav { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-right: 14px; }
  .nav-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.35); cursor: pointer; width: 24px; height: 24px; border-radius: 5px; font-size: 14px; color: #fff; display: flex; align-items: center; justify-content: center; transition: background 0.1s; font-family: inherit; line-height: 1; }
  .nav-btn:hover { background: rgba(255,255,255,0.3); }
  .month-label { font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; min-width: 90px; text-align: center; }

  .days-strip { display: flex; flex: 1; gap: 2px; overflow: hidden; align-items: center; }
  .day-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; min-width: 0; }
  .dow { font-size: 9px; color: rgba(255,255,255,0.65); font-weight: 600; }

  .day { font-size: 11px; width: 100%; height: 26px; border-radius: 5px; cursor: pointer; color: #fff; border: none; background: none; font-family: inherit; display: flex; align-items: center; justify-content: center; user-select: none; }
  .day:hover { background: rgba(255,255,255,0.2); }
  .day.other-month { color: rgba(255,255,255,0.3); cursor: default; pointer-events: none; }
  .day.in-range { background: rgba(255,255,255,0.25) !important; color: #fff; border-radius: 0; }
  .day.range-start { background: #fff !important; color: #EE7944; font-weight: 700; border-radius: 5px 0 0 5px; }
  .day.range-end   { background: #fff !important; color: #EE7944; font-weight: 700; border-radius: 0 5px 5px 0; }
  .day.range-start.range-end { border-radius: 5px; }
  .day.today:not(.range-start):not(.range-end):not(.in-range) { font-weight: 700; text-decoration: underline; }

  .cal-divider-v { width: 1px; height: 70px; background: rgba(255,255,255,0.2); margin: 0 14px; flex-shrink: 0; }
  .hint { font-size: 10px; color: rgba(255,255,255,0.75); white-space: nowrap; flex-shrink: 0; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <span class="date-label">Date</span>
    <div class="date-display">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="dateText">—</span>
    </div>
    <div class="divider-v"></div>
    <div class="quick-row">
      <button class="chip" onclick="setQuick('in_past_7',this)">Past 7 days</button>
      <button class="chip" onclick="setQuick('in_past_30',this)">Past 30 days</button>
      <button class="chip" onclick="setQuick('this_week',this)">This week</button>
      <button class="chip" onclick="setQuick('last_week',this)">Last week</button>
      <button class="chip active" onclick="setQuick('this_month',this)">This month</button>
      <button class="chip" onclick="setQuick('last_month',this)">Last month</button>
    </div>
    <button class="apply-btn" id="applyBtn" onclick="applyFilter()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#EE7944" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Apply
    </button>
    <span class="toast" id="toast"></span>
  </div>

  <div class="cal-row">
    <div class="cal-nav">
      <button class="nav-btn" onclick="navMonth(-1)">&#8249;</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" onclick="navMonth(1)">&#8250;</button>
    </div>
    <div class="days-strip" id="daysStrip"></div>
    <div class="cal-divider-v"></div>
    <span class="hint" id="hint">Click start date</span>
  </div>
</div>

<script>
  const pad    = n => String(n).padStart(2,'0');
  const fmt    = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const fmtD   = d => `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  const todayRaw = new Date(); todayRaw.setHours(0,0,0,0);
  const todayMs  = todayRaw.getTime();

  let startMs = null, endMs = null, hoverMs = null;
  let curY = todayRaw.getFullYear();
  let curM = todayRaw.getMonth();

  // BroadcastChannel — sinyal ke semua chart HTML
  const bc = new BroadcastChannel('scorecard_refresh');

  function cellDate(y, m, d) {
    const dt = new Date(y, m, d); dt.setHours(0,0,0,0); return dt.getTime();
  }

  function renderStrip() {
    const daysInMonth = new Date(curY, curM+1, 0).getDate();
    const firstDay    = new Date(curY, curM, 1).getDay();
    const prevDays    = new Date(curY, curM, 0).getDate();
    document.getElementById('monthLabel').textContent = `${MONTHS[curM]} ${curY}`;

    let cells = [];
    for (let i=0; i<firstDay; i++) {
      const pm = curM-1 < 0 ? 11 : curM-1;
      const py = curM-1 < 0 ? curY-1 : curY;
      cells.push({ d: prevDays-firstDay+1+i, y: py, m: pm, other: true });
    }
    for (let d=1; d<=daysInMonth; d++) cells.push({ d, y: curY, m: curM, other: false });
    let nx = 1;
    while (cells.length < 35) {
      const nm = curM+1 > 11 ? 0 : curM+1;
      const ny = curM+1 > 11 ? curY+1 : curY;
      cells.push({ d: nx++, y: ny, m: nm, other: true });
    }

    const strip = document.getElementById('daysStrip');
    strip.innerHTML = '';

    cells.forEach((c, i) => {
      const ms  = cellDate(c.y, c.m, c.d);
      const col = document.createElement('div');
      col.className = 'day-col';

      const dow = document.createElement('span');
      dow.className = 'dow';
      dow.textContent = DAYS[i % 7];

      const btn = document.createElement('button');
      btn.className = 'day' + (c.other ? ' other-month' : '') + (ms === todayMs && !c.other ? ' today' : '');
      btn.textContent = c.d;
      btn.dataset.ms  = ms;

      if (!c.other) {
        btn.addEventListener('mouseenter', () => {
          if (startMs !== null && endMs === null) { hoverMs = ms; applyRangeClasses(); }
        });
        btn.addEventListener('mouseleave', () => {
          if (startMs !== null && endMs === null) { hoverMs = null; applyRangeClasses(); }
        });
        btn.addEventListener('click', () => pickDay(ms));
      }

      col.appendChild(dow);
      col.appendChild(btn);
      strip.appendChild(col);
    });

    applyRangeClasses();
    updateHint();
    updateDisplay();
  }

  function applyRangeClasses() {
    const effEnd = (hoverMs !== null && startMs !== null && endMs === null && hoverMs >= startMs)
      ? hoverMs : endMs;
    document.querySelectorAll('#daysStrip .day:not(.other-month)').forEach(btn => {
      const ms = parseInt(btn.dataset.ms);
      btn.classList.remove('range-start','range-end','in-range');
      if (startMs !== null && ms === startMs) btn.classList.add('range-start');
      if (effEnd  !== null && ms === effEnd)  btn.classList.add('range-end');
      if (startMs !== null && effEnd !== null && ms > startMs && ms < effEnd) btn.classList.add('in-range');
    });
  }

  function pickDay(ms) {
    if (startMs === null || endMs !== null || ms < startMs) {
      startMs = ms; endMs = null; hoverMs = null;
    } else if (ms === startMs) {
      startMs = null; endMs = null; hoverMs = null;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    } else {
      endMs = ms; hoverMs = null;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    }
    applyRangeClasses();
    updateHint();
    updateDisplay();
  }

  function updateDisplay() {
    if (startMs !== null && endMs !== null) {
      document.getElementById('dateText').textContent = `${fmtD(new Date(startMs))} — ${fmtD(new Date(endMs))}`;
    } else if (startMs !== null) {
      document.getElementById('dateText').textContent = `${fmtD(new Date(startMs))} — ...`;
    } else {
      document.getElementById('dateText').textContent = '—';
    }
  }

  function updateHint() {
    const h = document.getElementById('hint');
    if (startMs === null) { h.textContent = 'Click start date'; return; }
    if (endMs === null)   { h.textContent = `Start: ${fmtD(new Date(startMs))}`; return; }
    const days = Math.round((endMs - startMs) / 86400000) + 1;
    h.textContent = `${days} days`;
  }

  function navMonth(dir) {
    curM += dir;
    if (curM > 11) { curM = 0; curY++; }
    if (curM < 0)  { curM = 11; curY--; }
    hoverMs = null;
    renderStrip();
  }

  function setQuick(type, el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const n = new Date(); n.setHours(0,0,0,0);
    let s, e;
    if      (type==='in_past_7')  { e=new Date(n); s=new Date(n); s.setDate(s.getDate()-6); }
    else if (type==='in_past_30') { e=new Date(n); s=new Date(n); s.setDate(s.getDate()-29); }
    else if (type==='this_week')  { s=new Date(n); s.setDate(s.getDate()-s.getDay()); e=new Date(s); e.setDate(e.getDate()+6); }
    else if (type==='last_week')  { s=new Date(n); s.setDate(s.getDate()-s.getDay()-7); e=new Date(s); e.setDate(e.getDate()+6); }
    else if (type==='this_month') { s=new Date(n.getFullYear(),n.getMonth(),1); e=new Date(n.getFullYear(),n.getMonth()+1,0); }
    else if (type==='last_month') { s=new Date(n.getFullYear(),n.getMonth()-1,1); e=new Date(n.getFullYear(),n.getMonth(),0); }
    startMs = s.getTime(); endMs = e.getTime(); hoverMs = null;
    curY = s.getFullYear(); curM = s.getMonth();
    document.getElementById('toast').textContent = '';
    renderStrip();
  }

  async function applyFilter() {
    const t   = document.getElementById('toast');
    const btn = document.getElementById('applyBtn');

    if (startMs === null || endMs === null) {
      t.style.color = '#ef4444'; t.textContent = 'Select a range.'; return;
    }

    btn.disabled = true;
    t.style.color = 'rgba(255,255,255,0.8)'; t.textContent = 'Sending…';

    const WORKER_URL = 'https://feishu-date-filter.stevenadaadaaja.workers.dev';

    try {
      const res  = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ start_date: fmt(new Date(startMs)), end_date: fmt(new Date(endMs)) }),
      });
      const data = await res.json();

      if (data.ok) {
        t.style.color = '#fff'; t.textContent = 'Updated! Charts loading…';
        bc.postMessage({ type: 'refresh' });
        // Clear message after 12 seconds (10s delay + 2s buffer for fetch)
        setTimeout(() => { t.textContent = ''; }, 12000);
      } else {
        t.style.color = '#ef4444'; t.textContent = `Error: ${data.feishu?.msg || data.error}`;
      }
    } catch (err) {
      t.style.color = '#ef4444'; t.textContent = 'Network error.';
    } finally {
      btn.disabled = false;
    }
  }

  // Fetch current active dates from Feishu and display
  async function fetchCurrentDates() {
    const WORKER_URL = 'https://feishu-date-filter.stevenadaadaaja.workers.dev';
    try {
      const res = await fetch(`${WORKER_URL}/api/dates`);
      const data = await res.json();
      if (data.ok && data.start_date && data.end_date) {
        // Parse dd/mm/yyyy back to ms for state
        const parseDate = str => {
          const [d, m, y] = str.split('/');
          const dt = new Date(+y, +m-1, +d); dt.setHours(0,0,0,0);
          return dt.getTime();
        };
        startMs = parseDate(data.start_date);
        endMs   = parseDate(data.end_date);
        // Navigate calendar to start date month
        const s = new Date(startMs);
        curY = s.getFullYear(); curM = s.getMonth();
        renderStrip();
        // Activate matching quick chip if applicable
        document.getElementById('toast').textContent = '';
      }
    } catch(_) {}
  }

  renderStrip();
  fetchCurrentDates();
</script>
</body>
</html>
