<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Store · Leadership Accountability</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #EE7944; color: #fff; font-family: 'DM Sans', sans-serif; height: 100vh; max-height: 100vh; display: flex; flex-direction: column; padding: 10px 12px 8px; gap: 8px; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
  .legend { display: flex; flex-wrap: wrap; gap: 4px 10px; flex: 1; }
  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: rgba(255,255,255,0.9);
    cursor: pointer; padding: 2px 6px; border-radius: 4px;
    transition: background 0.15s; user-select: none;
  }
  .legend-item:hover { background: rgba(255,255,255,0.15); }
  .legend-item.dimmed { opacity: 0.35; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  .controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
  .filter-label { font-size: 11px; color: rgba(255,255,255,0.7); }
  select { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.35); color: #fff; padding: 3px 8px; border-radius: 6px; cursor: pointer; outline: none; }
  select option { background: #c05a2a; color: #fff; }

  .top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
  .date-badge { font-size: 11px; color: rgba(255,255,255,0.85); font-family: 'DM Mono', monospace; background: rgba(255,255,255,0.15); padding: 3px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }

  .chart-wrap { flex: 1; background: #ffffff; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 10px; position: relative; min-height: 0; display: flex; align-items: center; justify-content: center; }
  canvas { width: 100% !important; }
  .empty-state { display: flex; flex-direction: column; align-items: center; gap: 12px; color: rgba(0,0,0,0.35); }
  .empty-state p { font-size: 13px; }
  .spinner-overlay { display: none; position: absolute; inset: 0; background: rgba(238,121,68,0.7); border-radius: 10px; align-items: center; justify-content: center; flex-direction: column; gap: 10px; backdrop-filter: blur(2px); }
  .spinner-overlay.show { display: flex; }
  .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .spinner-label { font-size: 12px; color: #fff; font-weight: 600; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { display: flex; align-items: center; flex-shrink: 0; }
  .status { font-size: 10px; color: rgba(255,255,255,0.6); font-family: 'DM Mono', monospace; }
  .status.error { color: #ffcccc; }

  .btn-refresh { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
  .btn-refresh:hover { background: rgba(255,255,255,0.25); }
  .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-refresh.loading svg { animation: spin 0.7s linear infinite; }
</style>
</head>
<body>

<div class="top-row">
  <div class="legend" id="legend"></div>
  <div class="controls">
    <span class="filter-label">Zona:</span>
    <select id="zonaFilter" onchange="onZonaChange()"><option value="">All</option></select>
    <span class="filter-label">AM:</span>
    <select id="amFilter" onchange="onAMChange()"><option value="">All</option></select>
    <span class="filter-label">Store:</span>
    <select id="storeFilter" onchange="applyFilters()"><option value="">All</option></select>
    <span id="dateRange" class="date-badge">— / —</span>
    <button class="btn-refresh" id="btnRefresh" onclick="triggerRefresh()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      Refresh
    </button>
  </div>
</div>

<div class="chart-wrap">
  <div class="empty-state" id="emptyState">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <p>No data loaded yet</p>
  </div>
  <canvas id="chart" style="display:none"></canvas>
  <div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
    <span class="spinner-label">Loading data…</span>
  </div>
</div>

<footer>
  <span class="status" id="status">Apply a date filter or click Refresh</span>
</footer>

<script>
const WORKER_URL = 'https://feishu-date-filter.stevenadaadaaja.workers.dev';
const DELAY_MS = 10000;

const ZONE_COLORS = [
  '#e74c3c','#e67e22','#f39c12','#2ecc71','#1abc9c',
  '#3498db','#9b59b6','#e91e63','#00bcd4','#8bc34a',
  '#ff5722','#607d8b','#795548','#ff9800','#4caf50',
  '#2196f3','#673ab7','#c0392b','#009688','#827717'
];

const bc = new BroadcastChannel('scorecard_refresh');
bc.onmessage = e => { if (e.data?.type === 'refresh') triggerRefresh(true); };

let allData = [], chartInstance = null;
let zoneColorMap = {};
let hoveredZone = null;

const quadrantPlugin = {
  id: 'quadrants',
  beforeDraw(chart) {
    const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
    const mx = x.getPixelForValue(5), my = y.getPixelForValue(5);
    ctx.fillStyle = 'rgba(255,255,255,1)'; ctx.fillRect(left, top, right-left, bottom-top);
    [
      { x: mx,   y: top,  w: right-mx,  h: my-top,    color: 'rgba(74,222,128,0.18)'  },
      { x: left, y: top,  w: mx-left,   h: my-top,    color: 'rgba(96,165,250,0.18)'  },
      { x: left, y: my,   w: mx-left,   h: bottom-my, color: 'rgba(248,113,113,0.18)' },
      { x: mx,   y: my,   w: right-mx,  h: bottom-my, color: 'rgba(251,191,36,0.18)'  },
    ].forEach(q => { ctx.fillStyle = q.color; ctx.fillRect(q.x, q.y, q.w, q.h); });
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(mx, top); ctx.lineTo(mx, bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(left, my); ctx.lineTo(right, my); ctx.stroke();
    ctx.restore();
  }
};

Chart.register(quadrantPlugin);

function getOrCreateChart() {
  if (chartInstance) return chartInstance;
  const ctx = document.getElementById('chart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'scatter', data: { datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: false, animation: { duration: 400 },
      layout: { padding: { top: 16, right: 20, bottom: 4, left: 4 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(0,0,0,0.8)', borderColor: 'rgba(255,255,255,0.15)', borderWidth: 1,
          titleColor: '#fff', bodyColor: 'rgba(255,255,255,0.8)',
          titleFont: { family: 'DM Sans', size: 12, weight: '700' },
          bodyFont: { family: 'DM Mono', size: 11 }, padding: 10,
          callbacks: {
            title: items => items[0].raw.label,
            label: item => [
              `Business  : ${Number(item.raw.x).toFixed(1)}`,
              `Leadership: ${Number(item.raw.y).toFixed(1)}`,
              `Zona      : ${item.raw.zona}`,
              `AM        : ${item.raw.am}`,
              `Category  : ${item.raw.category}`,
            ],
          }
        }
      },
      scales: {
        x: { min:0, max:10, title:{display:true,text:'Total Score Business Performance',color:'rgba(0,0,0,0.45)',font:{family:'DM Sans',size:10}}, grid:{color:'rgba(0,0,0,0.06)'}, ticks:{color:'rgba(0,0,0,0.45)',font:{family:'DM Mono',size:9},stepSize:2}, border:{color:'rgba(0,0,0,0.1)'} },
        y: { min:0, max:10, title:{display:true,text:'Total Score Leadership Responsiveness',color:'rgba(0,0,0,0.45)',font:{family:'DM Sans',size:10}}, grid:{color:'rgba(0,0,0,0.06)'}, ticks:{color:'rgba(0,0,0,0.45)',font:{family:'DM Mono',size:9},stepSize:2}, border:{color:'rgba(0,0,0,0.1)'} }
      }
    }
  });
  return chartInstance;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildZoneColorMap(rows) {
  const zones = [...new Set(rows.map(d => d.Zona).filter(Boolean))].sort();
  zoneColorMap = {};
  zones.forEach((z, i) => { zoneColorMap[z] = ZONE_COLORS[i % ZONE_COLORS.length]; });
}

function buildLegend(zones) {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  zones.forEach(z => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${zoneColorMap[z]}"></div>${z}`;
    item.addEventListener('mouseenter', () => { hoveredZone = z; updateOpacity(); });
    item.addEventListener('mouseleave', () => { hoveredZone = null; updateOpacity(); });
    item.addEventListener('click', () => {
      document.getElementById('zonaFilter').value = z;
      onZonaChange();
    });
    el.appendChild(item);
  });
}

function updateOpacity() {
  if (!chartInstance) return;
  chartInstance.data.datasets.forEach(ds => {
    const alpha = (hoveredZone === null || hoveredZone === ds.label) ? 0.85 : 0.08;
    ds.backgroundColor = hexToRgba(zoneColorMap[ds.label] || '#999', alpha);
  });
  chartInstance.update('none');
  document.querySelectorAll('.legend-item').forEach(el => {
    const zoneName = el.textContent.trim();
    el.classList.toggle('dimmed', hoveredZone !== null && hoveredZone !== zoneName);
  });
}

function populateDropdowns(rows) {
  const curZ = document.getElementById('zonaFilter').value;
  const curA = document.getElementById('amFilter').value;
  const zonas = [...new Set(rows.map(d => d.Zona).filter(Boolean))].sort();
  const selZ = document.getElementById('zonaFilter');
  selZ.innerHTML = '<option value="">All</option>';
  zonas.forEach(z => { const o = document.createElement('option'); o.value = z; o.textContent = z; if (z === curZ) o.selected = true; selZ.appendChild(o); });
  const zona = selZ.value;
  const ams = [...new Set((zona ? rows.filter(d => d.Zona === zona) : rows).map(d => d.AM).filter(Boolean))].sort();
  const selA = document.getElementById('amFilter');
  selA.innerHTML = '<option value="">All</option>';
  ams.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; if (a === curA) o.selected = true; selA.appendChild(o); });
}

function onZonaChange() {
  const zona = document.getElementById('zonaFilter').value;
  const filtered = zona ? allData.filter(d => d.Zona === zona) : allData;
  const ams = [...new Set(filtered.map(d => d.AM).filter(Boolean))].sort();
  const selA = document.getElementById('amFilter');
  selA.innerHTML = '<option value="">All</option>';
  ams.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; selA.appendChild(o); });
  populateStores(filtered);
  applyFilters();
}

function onAMChange() {
  const zona = document.getElementById('zonaFilter').value;
  const am   = document.getElementById('amFilter').value;
  let filtered = allData;
  if (zona) filtered = filtered.filter(d => d.Zona === zona);
  if (am)   filtered = filtered.filter(d => d.AM   === am);
  populateStores(filtered);
  applyFilters();
}

function populateStores(rows) {
  const cur = document.getElementById('storeFilter').value;
  const stores = [...new Set(rows.map(d => d.name).filter(Boolean))].sort();
  const sel = document.getElementById('storeFilter');
  sel.innerHTML = '<option value="">All</option>';
  stores.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; if (s === cur) o.selected = true; sel.appendChild(o); });
}

function applyFilters() {
  if (!allData.length) return;
  const zona = document.getElementById('zonaFilter').value;
  const am = document.getElementById('amFilter').value;
  let filtered = allData;
  if (zona) filtered = filtered.filter(d => d.Zona === zona);
  if (am)   filtered = filtered.filter(d => d.AM === am);
  renderChart(filtered);
}

function renderChart(rows) {
  const groups = {};
  rows.forEach(d => {
    const zona = d.Zona || 'Unknown';
    if (!groups[zona]) groups[zona] = [];
    groups[zona].push({ x: d.x, y: d.y, label: d.name || '—', category: d.category, zona, am: d.AM || '—' });
  });

  const chart = getOrCreateChart();
  chart.data.datasets = Object.entries(groups).map(([zona, pts]) => ({
    label: zona, data: pts,
    backgroundColor: hexToRgba(zoneColorMap[zona] || '#999', 0.85),
    borderColor: 'rgba(255,255,255,0.5)', borderWidth: 1,
    pointRadius: 5, pointHoverRadius: 7,
  }));
  chart.update();
  document.getElementById('chart').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';

  const zones = [...new Set(rows.map(d => d.Zona).filter(Boolean))].sort();
  buildLegend(zones);
}

let isLoading = false;
async function triggerRefresh(fromApply = false) {
  if (isLoading) return; isLoading = true;
  const btn = document.getElementById('btnRefresh'), status = document.getElementById('status'), overlay = document.getElementById('spinnerOverlay');
  btn.disabled = true; btn.classList.add('loading'); overlay.classList.add('show'); status.className = 'status';
  if (fromApply) { status.textContent = 'Waiting for Feishu to process…'; await new Promise(r => setTimeout(r, DELAY_MS)); }
  else { status.textContent = 'Fetching data…'; }
  try {
    const res = await fetch(`${WORKER_URL}/api/store`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Worker error');
    allData = json.data;
    buildZoneColorMap(allData);
    populateDropdowns(allData);
    populateStores(allData);
    applyFilters();
    status.textContent = `Updated ${new Date().toLocaleTimeString('id-ID')} · ${allData.length} records`;
    try {
      const dr = await fetch(`${WORKER_URL}/api/dates`);
      const drj = await dr.json();
      if (drj.ok) document.getElementById('dateRange').textContent = `${drj.start_date} — ${drj.end_date}`;
    } catch(_) {}
  } catch (err) { status.textContent = `Error: ${err.message}`; status.className = 'status error'; }
  finally { isLoading = false; btn.disabled = false; btn.classList.remove('loading'); overlay.classList.remove('show'); }
}
// Auto-load on open
triggerRefresh();
</script>
</body>
</html>
