<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zona · Leadership Accountability</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #EE7944; color: #fff; font-family: 'DM Sans', sans-serif; height: 100vh; max-height: 100vh; display: flex; flex-direction: column; padding: 14px 16px 12px; gap: 10px; }
  header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px 14px; }
  h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; }
  .legend-item {
    display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.9);
    cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: background 0.15s; user-select: none;
  }
  .legend-item:hover { background: rgba(255,255,255,0.15); }
  .legend-item.dimmed { opacity: 0.35; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .chart-wrap { flex: 1; background: #ffffff; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 12px; position: relative; min-height: 0; display: flex; align-items: center; justify-content: center; }
  canvas { width: 100% !important; }
  .empty-state { display: flex; flex-direction: column; align-items: center; gap: 12px; color: rgba(0,0,0,0.35); }
  .empty-state p { font-size: 13px; }
  .spinner-overlay { display: none; position: absolute; inset: 0; background: rgba(238,121,68,0.7); border-radius: 10px; align-items: center; justify-content: center; flex-direction: column; gap: 10px; backdrop-filter: blur(2px); }
  .spinner-overlay.show { display: flex; }
  .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .spinner-label { font-size: 12px; color: #fff; font-weight: 600; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .status { font-size: 10px; color: rgba(255,255,255,0.6); font-family: 'DM Mono', monospace; }
  .status.error { color: #ffcccc; }
  .btn-refresh { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-refresh:hover { background: rgba(255,255,255,0.25); }
  .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-refresh.loading svg { animation: spin 0.7s linear infinite; }
</style>
</head>
<body>
<header>
  <div class="legend" id="legend" style="flex:1;"></div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;">
    <span id="dateRange" style="font-size:11px;color:rgba(255,255,255,0.85);font-family:'DM Mono',monospace;background:rgba(255,255,255,0.15);padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.3);">— / —</span>
    <button class="btn-refresh" id="btnRefresh" onclick="triggerRefresh()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      Refresh
    </button>
  </div>
</header>
<div class="chart-wrap">
  <div class="empty-state" id="emptyState">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <p>No data loaded yet</p>
  </div>
  <canvas id="chart" style="display:none"></canvas>
  <div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
    <span class="spinner-label">Loading data…</span>
  </div>
</div>
<footer>
  <span class="status" id="status">Apply a date filter or click Refresh</span>
</footer>
<script>
const WORKER_URL = 'https://feishu-date-filter.stevenadaadaaja.workers.dev';
const DELAY_MS = 10000;

const CAT_COLORS = {
  'High Performance Leader':                     '#4ade80',
  'Operational Strong but Low Sales Performance':'#60a5fa',
  'Low Accountability':                          '#f87171',
  'Result Oriented but Weak Control':            '#fbbf24',
};

let hoveredZone = null;

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function updateOpacity() {
  if (!chartInstance) return;
  chartInstance.data.datasets.forEach(ds => {
    const baseColor = CAT_COLORS[ds.label] || '#999';
    const alpha = (hoveredZone === null || hoveredZone === ds.label) ? 1 : 0.1;
    ds.backgroundColor = hexToRgba(baseColor, alpha);
  });
  chartInstance.update('none');
  document.querySelectorAll('.legend-item').forEach(el => {
    const name = el.textContent.trim();
    el.classList.toggle('dimmed', hoveredZone !== null && hoveredZone !== name);
  });
}

const bc = new BroadcastChannel('scorecard_refresh');
bc.onmessage = e => { if (e.data?.type === 'refresh') triggerRefresh(true); };

const quadrantPlugin = {
  id: 'quadrants',
  beforeDraw(chart) {
    const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
    const mx = x.getPixelForValue(midX), my = y.getPixelForValue(midY);
    [ { x: left, y: top,  w: right-left, h: bottom-top, color: 'rgba(255,255,255,1.0)' },
      { x: mx,   y: top,  w: right-mx,  h: my-top,    color: 'rgba(74,222,128,0.25)'  },  // top-right: High Perf
      { x: left, y: top,  w: mx-left,   h: my-top,    color: 'rgba(96,165,250,0.25)'  },  // top-left: Operational
      { x: left, y: my,   w: mx-left,   h: bottom-my, color: 'rgba(248,113,113,0.25)' },  // bottom-left: Low Account
      { x: mx,   y: my,   w: right-mx,  h: bottom-my, color: 'rgba(251,191,36,0.25)'  },  // bottom-right: Result
    ].forEach(q => { ctx.fillStyle = q.color; ctx.fillRect(q.x, q.y, q.w, q.h); });
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(mx, top);  ctx.lineTo(mx, bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(left, my); ctx.lineTo(right, my);  ctx.stroke();
    ctx.restore();
  }
};

const bubbleLabelPlugin = {
  id: 'bubbleLabels',
  afterDatasetsDraw(chart) {
    chart.data.datasets.forEach((ds, di) => {
      const meta = chart.getDatasetMeta(di);
      meta.data.forEach((el, i) => {
        const pt = ds.data[i];
        const { ctx } = chart;
        ctx.save();
        ctx.font = 'bold 9px DM Sans, sans-serif';
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(pt.label, el.x, el.y);
        ctx.restore();
      });
    });
  }
};

Chart.register(quadrantPlugin, bubbleLabelPlugin);

let chartInstance = null;

function getOrCreateChart() {
  if (chartInstance) return chartInstance;
  const ctx = document.getElementById('chart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'bubble',
    data: { datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 400 },
      layout: { padding: { top: 20, right: 24, bottom: 8, left: 8 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(0,0,0,0.8)', borderColor: 'rgba(0,0,0,0.15)', borderWidth: 1,
          titleColor: '#fff', bodyColor: 'rgba(255,255,255,0.75)',
          titleFont: { family: 'DM Sans', size: 12, weight: '700' },
          bodyFont: { family: 'DM Mono', size: 11 }, padding: 10,
          callbacks: {
            title: items => items[0].raw.label,
            label: item => [
              `Business  : ${Number(item.raw.x).toFixed(1)}`,
              `Leadership: ${Number(item.raw.y).toFixed(1)}`,
              `Category  : ${item.raw.category}`,
            ],
          }
        }
      },
      scales: {
        x: { min:0, max:10, title:{display:true,text:'Total Score Business Performance',color:'rgba(0,0,0,0.55)',font:{family:'DM Sans',size:10}}, grid:{color:'rgba(0,0,0,0.08)'}, ticks:{color:'rgba(0,0,0,0.55)',font:{family:'DM Mono',size:9},stepSize:2}, border:{color:'rgba(0,0,0,0.15)'} },
        y: { min:0, max:10, title:{display:true,text:'Total Score Leadership Responsiveness',color:'rgba(0,0,0,0.55)',font:{family:'DM Sans',size:10}}, grid:{color:'rgba(0,0,0,0.08)'}, ticks:{color:'rgba(0,0,0,0.55)',font:{family:'DM Mono',size:9},stepSize:2}, border:{color:'rgba(0,0,0,0.15)'} }
      }
    }
  });
  return chartInstance;
}

let isLoading = false;

async function triggerRefresh(fromApply = false) {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('btnRefresh');
  const status = document.getElementById('status');
  const overlay = document.getElementById('spinnerOverlay');
  btn.disabled = true; btn.classList.add('loading');
  overlay.classList.add('show'); status.className = 'status';
  if (fromApply) {
    status.textContent = 'Waiting for Feishu to process…';
    await new Promise(r => setTimeout(r, DELAY_MS));
  } else {
    status.textContent = 'Fetching data…';
  }
  try {
    const res = await fetch(`${WORKER_URL}/api/zona`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Worker error');

    // Update quadrant midpoints from baseline
    midX = json.midX ?? 5;
    midY = json.midY ?? 5;

    const groups = {};
    json.data.forEach(d => {
      const cat = d.category || 'Unknown';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push({ x: d.x, y: d.y, r: 14, label: d.Zona || '—', category: cat });
    });

    const chart = getOrCreateChart();
    chart.data.datasets = Object.entries(groups).map(([cat, pts]) => ({
      label: cat, data: pts,
      clip: false,
      backgroundColor: CAT_COLORS[cat] || 'rgba(255,255,255,0.6)',
      borderColor: 'rgba(255,255,255,0.4)', borderWidth: 1,
    }));
    chart.update();
    document.getElementById('chart').style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';

    // Build interactive legend
    const legendEl = document.getElementById('legend');
    legendEl.innerHTML = '';
    const catColors = { 'High Performance Leader':'#4ade80', 'Operational Strong but Low Sales Performance':'#60a5fa', 'Low Accountability':'#f87171', 'Result Oriented but Weak Control':'#fbbf24' };
    Object.entries(catColors).forEach(([cat, color]) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      const shortName = cat === 'Operational Strong but Low Sales Performance' ? 'Operational Strong but Low Sales' : cat;
      item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${shortName}`;
      item.addEventListener('mouseenter', () => { hoveredZone = cat; updateOpacity(); });
      item.addEventListener('mouseleave', () => { hoveredZone = null; updateOpacity(); });
      legendEl.appendChild(item);
    });

    status.textContent = `Updated ${new Date().toLocaleTimeString('id-ID')} · ${json.data.length} records`;
    // Fetch and display current date range
    try {
      const dr = await fetch(`${WORKER_URL}/api/dates`);
      const drj = await dr.json();
      if (drj.ok) document.getElementById('dateRange').textContent = `${drj.start_date} — ${drj.end_date}`;
    } catch(_) {}
  } catch (err) {
    status.textContent = `Error: ${err.message}`;
    status.className = 'status error';
  } finally {
    isLoading = false; btn.disabled = false; btn.classList.remove('loading'); overlay.classList.remove('show');
  }
}
// Auto-load on open
triggerRefresh();
</script>
</body>
</html>
